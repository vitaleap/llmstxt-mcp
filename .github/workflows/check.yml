name: Check

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true

      - name: Install
        run: pnpm install

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build
